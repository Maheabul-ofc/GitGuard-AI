version: "3.8"

services:
  # ── Express Backend ──
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gitguard-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── React Frontend (Nginx) ──
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gitguard-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
